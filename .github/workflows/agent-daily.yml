name: GrabCalls Daily Agent

on:
  schedule:
    # 8:15am CT daily (13:15 UTC)
    - cron: '15 13 * * *'
  workflow_dispatch:
    inputs:
      task:
        description: 'Task to run'
        required: false
        default: 'daily-brief'
        type: choice
        options:
          - daily-brief
          - outreach-pipeline
          - research
          - campaign-analysis
          - test

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run agent task
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: |
          TASK="${{ github.event.inputs.task || 'daily-brief' }}"
          echo "Running task: $TASK"
          node agents/index.js $TASK
