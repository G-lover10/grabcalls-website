name: Deploy to Cloudflare (grabcalls.com)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: deploy-cloudflare
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy station-12 Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: d15fe785db8c6f1f3991d1e8d5361899
          wranglerVersion: '4.113.0'
          command: deploy
