<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#d62828" />
<title>E12 Truck Swap · Station 12</title>
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Station 12" />
<style>
  :root {
    --bg: #0a0a0a;
    --panel: #16181c;
    --panel-2: #1f2227;
    --line: #2a2e35;
    --text: #f5f5f5;
    --muted: #9aa0a6;
    --red: #d62828;
    --red-soft: #8b1c1c;
    --gold: #f5c518;
    --green: #2ea043;
    --blue: #2f6feb;
    --orange: #f0883e;
    --radius: 12px;
    --shadow: 0 4px 20px rgba(0,0,0,0.4);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    font-size: 16px;
    line-height: 1.4;
    -webkit-font-smoothing: antialiased;
    padding-bottom: calc(env(safe-area-inset-bottom) + 80px);
  }

  /* ── Header ── */
  .app-header {
    background: linear-gradient(180deg, rgba(198,40,40,0.96) 0%, rgba(155,28,28,0.96) 100%);
    padding: 14px 16px 12px;
    padding-top: calc(env(safe-area-inset-top) + 14px);
    position: sticky; top: 0; z-index: 100;
    box-shadow: var(--shadow);
  }
  .header-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .back-btn {
    background: rgba(0,0,0,0.25);
    border: none; border-radius: 8px;
    color: white; font-size: 18px;
    padding: 6px 10px; cursor: pointer;
    font-family: inherit; font-weight: 700;
    flex-shrink: 0;
    text-decoration: none;
    display: inline-flex; align-items: center;
  }
  .header-title {
    flex: 1;
    font-size: 18px; font-weight: 800;
    color: white; line-height: 1.2;
  }
  .header-sub { font-size: 12px; font-weight: 500; opacity: 0.8; }
  .reset-btn {
    background: rgba(0,0,0,0.25);
    border: none; border-radius: 8px;
    color: rgba(255,255,255,0.75); font-size: 12px;
    padding: 6px 10px; cursor: pointer;
    font-family: inherit; font-weight: 700;
    flex-shrink: 0;
  }
  .reset-btn:active { background: rgba(0,0,0,0.5); }

  /* Progress bar */
  .progress-wrap {
    background: rgba(0,0,0,0.3);
    border-radius: 99px;
    height: 8px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, #f5c518, #2ea043);
    border-radius: 99px;
    transition: width 0.25s ease;
    min-width: 4px;
  }
  .progress-label {
    display: flex; justify-content: space-between;
    font-size: 12px; color: rgba(255,255,255,0.8);
    margin-top: 4px; font-weight: 600;
  }

  /* ── Sections ── */
  .section {
    margin: 12px 12px 0;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .section-header {
    display: flex; align-items: center;
    padding: 11px 14px;
    border-bottom: 1px solid var(--line);
    gap: 8px;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
  }
  .section-header:active { background: var(--panel-2); }
  .section-icon { font-size: 18px; flex-shrink: 0; }
  .section-label {
    flex: 1;
    font-size: 14px; font-weight: 800;
    text-transform: uppercase; letter-spacing: 0.06em;
    line-height: 1.2;
  }
  .section-count {
    font-size: 12px; font-weight: 700;
    color: var(--muted);
    background: var(--panel-2);
    border: 1px solid var(--line);
    border-radius: 99px;
    padding: 2px 8px;
    flex-shrink: 0;
  }
  .section-count.done { color: var(--green); border-color: rgba(46,160,67,0.4); }
  .section-chevron {
    font-size: 12px; color: var(--muted);
    transition: transform 0.2s;
    flex-shrink: 0;
  }
  .section.collapsed .section-chevron { transform: rotate(-90deg); }
  .section-body { display: block; }
  .section.collapsed .section-body { display: none; }

  /* Warn section (gold border) */
  .section.warn { border-color: rgba(245,197,24,0.5); }
  .section.warn .section-header { background: rgba(245,197,24,0.06); }
  .section.warn .section-label { color: var(--gold); }

  /* ── Checklist items ── */
  .item {
    display: flex;
    align-items: center;
    gap: 0;
    border-bottom: 1px solid var(--line);
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    transition: background 0.1s;
    min-height: 58px;
  }
  .item:last-child { border-bottom: none; }
  .item:active { background: var(--panel-2); }
  .item.checked { background: rgba(46,160,67,0.06); }
  .item.skipped { background: rgba(47,111,235,0.06); }

  .item-check {
    width: 58px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    self-align: stretch;
    min-height: 58px;
  }
  .check-box {
    width: 28px; height: 28px;
    border-radius: 8px;
    border: 2px solid var(--line);
    background: var(--panel-2);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .item.checked .check-box {
    background: var(--green);
    border-color: var(--green);
  }
  .item.skipped .check-box {
    background: var(--blue);
    border-color: var(--blue);
  }

  .item-text {
    flex: 1;
    padding: 12px 14px 12px 0;
    font-size: 15px;
    line-height: 1.35;
  }
  .item.checked .item-text {
    color: var(--muted);
    text-decoration: line-through;
    text-decoration-color: rgba(46,160,67,0.5);
  }
  .item.skipped .item-text { color: var(--muted); }

  .item-skip {
    flex-shrink: 0;
    padding: 0 12px 0 0;
    display: flex; align-items: center;
  }
  .skip-btn {
    background: transparent;
    border: 1px solid var(--line);
    border-radius: 6px;
    color: var(--muted);
    font-size: 11px; font-weight: 700;
    font-family: inherit;
    padding: 4px 7px;
    cursor: pointer;
    white-space: nowrap;
    line-height: 1.2;
  }
  .skip-btn:active { background: rgba(47,111,235,0.15); border-color: var(--blue); color: #8ab4ff; }
  .item.skipped .skip-btn { background: rgba(47,111,235,0.15); border-color: var(--blue); color: #8ab4ff; }

  /* Warn items */
  .section.warn .item-text { font-weight: 600; }

  /* ── Notes ── */
  .notes-section {
    margin: 12px 12px 0;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 14px;
  }
  .notes-label {
    font-size: 12px; font-weight: 800;
    text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--muted); margin-bottom: 8px;
  }
  .notes-input {
    width: 100%;
    background: var(--panel-2);
    border: 1px solid var(--line);
    border-radius: 8px;
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    padding: 10px 12px;
    resize: none;
    min-height: 80px;
    line-height: 1.5;
  }
  .notes-input:focus { outline: 1px solid var(--red); border-color: var(--red); }
  .notes-hint { font-size: 11px; color: var(--muted); margin-top: 5px; }

  /* ── Complete bar ── */
  .complete-bar {
    position: fixed;
    bottom: env(safe-area-inset-bottom);
    left: 0; right: 0;
    background: var(--panel);
    border-top: 1px solid var(--line);
    padding: 10px 16px;
    display: flex;
    gap: 10px;
    z-index: 50;
  }
  .complete-btn {
    flex: 1;
    padding: 14px;
    border-radius: 10px;
    border: none;
    font-size: 16px; font-weight: 800;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.15s;
  }
  .complete-btn.inactive { background: var(--panel-2); color: var(--muted); }
  .complete-btn.active { background: var(--green); color: #0a0a0a; }
  .complete-btn.active:active { background: #238636; }

  /* ── Done overlay ── */
  .done-overlay {
    display: none;
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.85);
    align-items: center; justify-content: center;
    flex-direction: column;
    padding: 32px;
    text-align: center;
  }
  .done-overlay.show { display: flex; }
  .done-emoji { font-size: 72px; margin-bottom: 16px; }
  .done-title { font-size: 28px; font-weight: 900; color: var(--green); margin-bottom: 8px; }
  .done-sub { font-size: 15px; color: var(--muted); margin-bottom: 28px; line-height: 1.5; }
  .done-time { font-size: 13px; color: var(--muted); margin-bottom: 28px; }
  .done-actions { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 280px; }
  .done-btn {
    padding: 14px; border-radius: 10px; border: none;
    font-size: 15px; font-weight: 700; font-family: inherit;
    cursor: pointer;
  }
  .done-btn-primary { background: var(--green); color: #0a0a0a; }
  .done-btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--line); }
</style>
</head>
<body>

<header class="app-header">
  <div class="header-row">
    <a href="index.html" class="back-btn">← E12</a>
    <div class="header-title">
      Truck Swap
      <div class="header-sub">E12 → Reserve</div>
    </div>
    <button class="reset-btn" id="resetBtn">Reset</button>
  </div>
  <div class="progress-wrap">
    <div class="progress-bar" id="progressBar" style="width:0%"></div>
  </div>
  <div class="progress-label">
    <span id="progressLabel">0 of 0 items</span>
    <span id="progressPct">0%</span>
  </div>
</header>

<div id="listContainer"></div>

<div class="notes-section">
  <div class="notes-label">Swap Notes</div>
  <textarea class="notes-input" id="swapNotes" placeholder="Anything the reserve already had, anything unusual, items left on E12..."></textarea>
  <div class="notes-hint">Saved automatically. Example: "This reserve had attack nozzles, no blitz nozzle."</div>
</div>

<div class="complete-bar">
  <button class="complete-btn inactive" id="completeBtn">Swap Complete ✓</button>
</div>

<div class="done-overlay" id="doneOverlay">
  <div class="done-emoji">🚒</div>
  <div class="done-title">Swap Complete</div>
  <div class="done-sub">E12 equipment transferred to reserve.<br>Reserve is ready to roll.</div>
  <div class="done-time" id="doneTime"></div>
  <div class="done-actions">
    <button class="done-btn done-btn-primary" id="doneBackBtn">Back to Station 12</button>
    <button class="done-btn done-btn-ghost" id="doneStayBtn">View Checklist</button>
  </div>
</div>

<script>
"use strict";

const STORAGE_KEY = "station12-swap-v1";

// ── Checklist data ──────────────────────────────────────────────────
const SECTIONS = [
  {
    id: "critical",
    icon: "⚠️",
    label: "Check First — Often Missing on Reserve",
    warn: true,
    items: [
      "5-inch intake elbow + rope & hook (from E12 tailboard rail)",
      "Pump intake connection (from E12 intake — reserve may not have one)",
      "Jump / bumper line nozzle",
      "Blitz nozzle (3-inch line)",
      "Monitor gun nozzle + tip",
      "Gated wye (if not on reserve)",
    ]
  },
  {
    id: "ds1",
    icon: "🔴",
    label: "Driver's Side — 1st Compartment",
    items: [
      "3-inch pig tail",
      "Male to male adapter",
      "Air hose",
      "2 mallets",
      "WD-40",
      "2 flashlights",
      "2 wedges",
      "2 hydrant caps",
      "Air chuck",
      "25-ft section of 5-inch hose",
      "50-ft section of 5-inch hose",
      "Wheel chocks",
    ]
  },
  {
    id: "toolbox",
    icon: "🧰",
    label: "Tool Box (transfer entire box)",
    items: [
      "Tool box top: 5 flat head screwdrivers, 3 Phillips, 9 wrenches",
      "Tool box top: 4 Allen wrenches, 4 crescent wrenches, 5 channel locks",
      "Tool box top: wire cutters, 2 knives, box cutter, red stake, grease pencil",
      "Tool box bottom: mini crow bar, putty knife, 3 wire cutters, 1-inch wrench",
      "Tool box bottom: rubber gasket, 2 wedges, 3 hammers",
      "Tool box bottom: hand saw (2 blades), tape measure, 2 mattress hooks, 2 adj. wrenches",
    ]
  },
  {
    id: "ds2",
    icon: "🔴",
    label: "Driver's Side — 2nd Compartment",
    items: [
      "Haligan",
      "Big easy",
      "Callahan (yellow)",
      "Sledgehammer",
      "Pinch bar",
      "Bolt cutter",
      "Crow bar",
      "Airport hydrant wrench",
      "3 water keys",
    ]
  },
  {
    id: "ds3",
    icon: "💊",
    label: "Driver's Side — 3rd Compartment (Medical)",
    items: [
      "AED",
      "Advanced medical bag",
      "Red medical bag",
      "C collar bag",
      "Air splint bag",
      "Man sack",
      "Life vac",
      "OB kit",
      "Sharps container",
      "Sterile burn sheet",
      "Pet mask",
      "Ice packs",
      "Red bags",
      "Spare O2 bottle",
      "Trash can",
    ]
  },
  {
    id: "rear",
    icon: "🔴",
    label: "Rear Compartment",
    items: [
      "Hydrant assist",
      "Portable hydrant",
      "5 safety cones",
      "Blitz nozzle (rear compartment)",
      "Hydrant bag",
    ]
  },
  {
    id: "os1",
    icon: "🔵",
    label: "Officer's Side — 1st Compartment",
    items: [
      "Utility rope",
      "Throw rope",
      "Kermantle rope",
      "Water rescue bag",
      "Decon bag",
      "Pick head axe",
      "Flat head axe",
      "Water cooler",
      "Water cups",
    ]
  },
  {
    id: "os2",
    icon: "🔵",
    label: "Officer's Side — 2nd Compartment",
    items: [
      "2 salvage tarps",
      "Standpipe package (15-16 smooth bore nozzle inside)",
    ]
  },
  {
    id: "os3",
    icon: "🌊",
    label: "Officer's Side — 3rd Compartment (Foam & Nozzles)",
    items: [
      "PPV fan",
      "Oil dry",
      "Gas can",
      "ABC extinguisher",
      "Pump can",
      "2 fog nozzles",
      "Foam educator",
      "Foam nozzle",
      "7 adapters",
      "Cellar nozzle",
      "Portable master stream stand",
      "1 3/8\" smooth bore tip",
      "Bungee cord",
    ]
  },
  {
    id: "top",
    icon: "🪜",
    label: "Crow's Nest & Top",
    items: [
      "Shovel",
      "Foam (container)",
      "Smooth bore tip — 1 3/8\" (500 gpm)",
      "Smooth bore tip — 1 1/2\" (600 gpm)",
      "Smooth bore tip — 1 3/4\" (800 gpm)",
      "Smooth bore tip — 2\" (1000 gpm)",
    ]
  },
  {
    id: "ladders",
    icon: "🪜",
    label: "Ladders",
    items: [
      "10-ft scuttle ladder",
      "14-ft ladder",
      "24-ft ladder",
    ]
  },
];

// Flatten for total count
let allItems = [];
SECTIONS.forEach(s => s.items.forEach((_, i) => allItems.push(`${s.id}-${i}`)));
const TOTAL = allItems.length;

// ── State ─────────────────────────────────────────────────────────
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return { checked: [], skipped: [], notes: "", completedAt: null };
    return JSON.parse(raw);
  } catch(_) { return { checked: [], skipped: [], notes: "", completedAt: null }; }
}
function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch(_) {}
}

let state = loadState();
if (!Array.isArray(state.checked)) state.checked = [];
if (!Array.isArray(state.skipped)) state.skipped = [];
if (typeof state.notes !== "string") state.notes = "";

// ── Render ────────────────────────────────────────────────────────
function itemKey(sectionId, idx) { return `${sectionId}-${idx}`; }

function buildUI() {
  const container = document.getElementById("listContainer");
  container.innerHTML = "";

  SECTIONS.forEach(sec => {
    const sectionDone = sec.items.every((_, i) => {
      const k = itemKey(sec.id, i);
      return state.checked.includes(k) || state.skipped.includes(k);
    });
    const sectionChecked = sec.items.filter((_, i) => state.checked.includes(itemKey(sec.id, i))).length;
    const sectionSkipped = sec.items.filter((_, i) => state.skipped.includes(itemKey(sec.id, i))).length;
    const sectionDoneCount = sectionChecked + sectionSkipped;

    const div = document.createElement("div");
    div.className = "section" + (sec.warn ? " warn" : "") + (sectionDone ? " collapsed" : "");
    div.dataset.id = sec.id;

    // Section header
    const hdr = document.createElement("div");
    hdr.className = "section-header";
    hdr.innerHTML = `
      <span class="section-icon">${sec.icon}</span>
      <span class="section-label">${sec.label}</span>
      <span class="section-count${sectionDone ? " done" : ""}">${sectionDoneCount}/${sec.items.length}</span>
      <span class="section-chevron">▼</span>
    `;
    hdr.addEventListener("click", () => div.classList.toggle("collapsed"));

    // Section body
    const body = document.createElement("div");
    body.className = "section-body";

    sec.items.forEach((text, idx) => {
      const k = itemKey(sec.id, idx);
      const isChecked = state.checked.includes(k);
      const isSkipped = state.skipped.includes(k);

      const row = document.createElement("div");
      row.className = "item" + (isChecked ? " checked" : isSkipped ? " skipped" : "");
      row.innerHTML = `
        <div class="item-check">
          <div class="check-box">${isChecked ? "✓" : isSkipped ? "↷" : ""}</div>
        </div>
        <div class="item-text">${text}</div>
        <div class="item-skip">
          <button class="skip-btn" data-key="${k}" type="button">${isSkipped ? "undo" : "had it"}</button>
        </div>
      `;

      // Tap main row → toggle checked
      row.querySelector(".item-check").addEventListener("click", () => toggleCheck(k));
      row.querySelector(".item-text").addEventListener("click", () => toggleCheck(k));

      // "had it" button → toggle skip
      row.querySelector(".skip-btn").addEventListener("click", e => {
        e.stopPropagation();
        toggleSkip(k);
      });

      body.appendChild(row);
    });

    div.appendChild(hdr);
    div.appendChild(body);
    container.appendChild(div);
  });
}

function toggleCheck(key) {
  const ci = state.checked.indexOf(key);
  const si = state.skipped.indexOf(key);
  if (si !== -1) state.skipped.splice(si, 1); // remove from skipped first
  if (ci === -1) {
    state.checked.push(key);
  } else {
    state.checked.splice(ci, 1);
  }
  saveState();
  buildUI();
  updateProgress();
}

function toggleSkip(key) {
  const ci = state.checked.indexOf(key);
  const si = state.skipped.indexOf(key);
  if (ci !== -1) state.checked.splice(ci, 1); // remove from checked first
  if (si === -1) {
    state.skipped.push(key);
  } else {
    state.skipped.splice(si, 1);
  }
  saveState();
  buildUI();
  updateProgress();
}

function updateProgress() {
  const done = state.checked.length + state.skipped.length;
  const pct = TOTAL === 0 ? 0 : Math.round(done / TOTAL * 100);
  document.getElementById("progressBar").style.width = pct + "%";
  document.getElementById("progressLabel").textContent = `${done} of ${TOTAL} items`;
  document.getElementById("progressPct").textContent = pct + "%";

  const btn = document.getElementById("completeBtn");
  if (done >= TOTAL) {
    btn.classList.remove("inactive");
    btn.classList.add("active");
    btn.textContent = "✓ Swap Complete — Tap to Confirm";
  } else {
    btn.classList.remove("active");
    btn.classList.add("inactive");
    btn.textContent = `Swap Complete (${TOTAL - done} remaining)`;
  }
}

// ── Notes ────────────────────────────────────────────────────────
const notesEl = document.getElementById("swapNotes");
notesEl.value = state.notes;
notesEl.addEventListener("input", () => {
  state.notes = notesEl.value;
  saveState();
});

// ── Complete ─────────────────────────────────────────────────────
document.getElementById("completeBtn").addEventListener("click", () => {
  if (state.checked.length + state.skipped.length < TOTAL) return;
  const now = new Date();
  state.completedAt = now.toISOString();
  saveState();
  const overlay = document.getElementById("doneOverlay");
  overlay.classList.add("show");
  document.getElementById("doneTime").textContent =
    "Completed " + now.toLocaleString("en-US", { weekday:"short", month:"short", day:"numeric", hour:"numeric", minute:"2-digit" });
});

document.getElementById("doneBackBtn").addEventListener("click", () => {
  window.location.href = "index.html";
});
document.getElementById("doneStayBtn").addEventListener("click", () => {
  document.getElementById("doneOverlay").classList.remove("show");
});

// ── Reset ────────────────────────────────────────────────────────
document.getElementById("resetBtn").addEventListener("click", () => {
  if (!confirm("Reset the checklist? This clears all checked items and notes.")) return;
  state = { checked: [], skipped: [], notes: "", completedAt: null };
  saveState();
  notesEl.value = "";
  buildUI();
  updateProgress();
});

// ── Init ─────────────────────────────────────────────────────────
buildUI();
updateProgress();
</script>
</body>
</html>
